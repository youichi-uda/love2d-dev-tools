<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f06292"/>
      <stop offset="100%" stop-color="#e74a99"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#e74a99" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="32" ry="32" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="64" x2="256" y2="64"/>
    <line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="192" x2="256" y2="192"/>
    <line x1="64" y1="0" x2="64" y2="256"/>
    <line x1="128" y1="0" x2="128" y2="256"/>
    <line x1="192" y1="0" x2="192" y2="256"/>
  </g>

  <!-- Heart shape (Love2D logo reference) -->
  <g filter="url(#shadow)" transform="translate(128, 120)">
    <path d="M0,28 C0,28 -60,-28 -60,-52 C-60,-76 -36,-84 -18,-72 C-6,-64 0,-48 0,-48 C0,-48 6,-64 18,-72 C36,-84 60,-76 60,-52 C60,-28 0,28 0,28 Z"
          fill="url(#heart)" transform="scale(1.35)"/>
  </g>

  <!-- Code brackets overlay on heart -->
  <g transform="translate(128, 116)" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- Left bracket < -->
    <polyline points="-14,-16 -30,0 -14,16"/>
    <!-- Right bracket > -->
    <polyline points="14,-16 30,0 14,16"/>
    <!-- Slash / -->
    <line x1="8" y1="-18" x2="-8" y2="18" stroke-width="4"/>
  </g>

  <!-- "DEV" label at bottom -->
  <text x="128" y="232" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="50" font-weight="700" letter-spacing="8" fill="#a6adc8">DEV</text>
</svg>
